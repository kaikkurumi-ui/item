server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/item?allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  jackson:
    default-property-inclusion: use_defaults #使用 Jackson 默认策略。
#   default-property-inclusion: non_default #字段等于默认值时不输出
#   default-property-inclusion: non_empty #字段有空值就不输出
#   default-property-inclusion: non_absent # 如果返回的对象的字段中有Optional.empty()，会不输出该字段，而non_null会输出
#   default-property-inclusion: non_null # 输出字段中有null值的字段，该字段就不输出
#   default-property-inclusion: custom 自定义配置，需要设置Filter过滤器和注解@JsonInclude
#   default-property-inclusion: always 表示所有字段都输出。
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl